services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: "postgresql://booking_user:booking_password@postgres:5432/booking_db?schema=public"
      JWT_SECRET: "change-this-development-secret-before-deploying"
      JWT_EXPIRES_IN: "1d"
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

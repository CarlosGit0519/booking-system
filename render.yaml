services:
  - type: web
    name: booking-system-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: booking-system-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d

databases:
  - name: booking-system-db
    plan: free
    region: frankfurt
    databaseName: booking_db
    user: booking_user
